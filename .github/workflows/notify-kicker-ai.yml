name: Notify kicker-ai of skills changes

# 当 main 分支收到改动时，向 kicker-ai 仓库发 repository_dispatch，
# 触发那边的 bump-skills.yml workflow 自动开 PR 把
# docker/sandbox-runtime/kicker-skills.sha 钉到本仓库最新 sha。
#
# 端到端链路：
#   skills 改动 → 本 workflow 发 dispatch
#                → kicker-ai bump-skills 开 PR + 自动 squash-merge
#                → kicker-ai docker-push-base 重建 sandbox-runtime 镜像
#                → Komodo rollout 让 sandbox/worker 用上新 skills

on:
  push:
    branches:
      - main
    paths:
      - 'skills/**'
      - 'scenarios.json'
      - '.github/workflows/notify-kicker-ai.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: 发送 skills-updated dispatch 到 kicker-ai
        env:
          GH_TOKEN: ${{ secrets.KICKERAI_DISPATCH_PAT }}
          # 用 env 而不是把 ${{ ... }} 直接塞进 shell 命令，
          # 防止 commit message 中的特殊字符被 shell 解析（注入防御）。
          SHA: ${{ github.sha }}
          COMPARE_URL: ${{ github.event.compare }}
          AUTHOR: ${{ github.event.head_commit.author.name }}
          MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          jq -n \
            --arg sha "$SHA" \
            --arg compare_url "$COMPARE_URL" \
            --arg author "$AUTHOR" \
            --arg message "$MESSAGE" \
            '{
              event_type: "skills-updated",
              client_payload: {
                sha: $sha,
                compare_url: $compare_url,
                author: $author,
                message: $message
              }
            }' \
          | gh api repos/org-resolvai/kicker-ai/dispatches \
              --method POST \
              --input -

          echo "✅ skills-updated dispatch sent for ${SHA:0:7}"
